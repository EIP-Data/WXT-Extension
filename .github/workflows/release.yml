name: Build & Release Extension

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Extension Zips
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for tag-based versioning

      # ── 2. Setup Node ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Type-check ─────────────────────────────────────────────────────
      - name: Type check
        run: npm run compile

      # ── 5. Build & zip for Chrome ──────────────────────────────────────────
      - name: Build & zip (Chrome)
        env:
          VITE_API_ENDPOINT: ${{ secrets.VITE_API_ENDPOINT }}
        run: npm run zip

      # ── 6. Build & zip for Firefox ─────────────────────────────────────────
      - name: Build & zip (Firefox)
        env:
          VITE_API_ENDPOINT: ${{ secrets.VITE_API_ENDPOINT }}
        run: npm run zip:firefox

      # ── 7. Collect zip artifacts ───────────────────────────────────────────
      - name: Find zip artifacts
        id: find_zips
        run: |
          CHROME_ZIP=$(find .output -name '*.zip' ! -name '*firefox*' ! -name '*sources*' | head -n 1)
          FIREFOX_ZIP=$(find .output -name '*firefox*.zip' ! -name '*sources*' | head -n 1)
          SOURCES_ZIP=$(find .output -name '*sources*' | head -n 1)

          echo "chrome_zip=$CHROME_ZIP" >> $GITHUB_OUTPUT
          echo "firefox_zip=$FIREFOX_ZIP" >> $GITHUB_OUTPUT
          echo "sources_zip=$SOURCES_ZIP" >> $GITHUB_OUTPUT

          echo "=== Output directory contents ==="
          ls -lh .output/

      # ── 8. Extract version from package.json ───────────────────────────────
      - name: Get extension version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=${GITHUB_SHA::7}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "release_name=Datalyz Extension v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      # ── 9. Upload Chrome zip as artifact ───────────────────────────────────
      - name: Upload Chrome zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: datalyz-chrome-${{ steps.version.outputs.tag }}
          path: ${{ steps.find_zips.outputs.chrome_zip }}
          retention-days: 30

      # ── 10. Upload Firefox zip as artifact ─────────────────────────────────
      - name: Upload Firefox zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: datalyz-firefox-${{ steps.version.outputs.tag }}
          path: ${{ steps.find_zips.outputs.firefox_zip }}
          retention-days: 30

      # ── 11. Create GitHub Release with zips attached ───────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.find_zips.outputs.chrome_zip }}
            ${{ steps.find_zips.outputs.firefox_zip }}
          body: |
            ## 🚀 Datalyz Extension ${{ steps.version.outputs.version }}

            Built from commit `${{ github.sha }}` on branch `main`.

            ### 📦 Downloads
            | Browser | File |
            |---------|------|
            | Chrome / Edge / Brave | `datalyz-chrome-${{ steps.version.outputs.tag }}.zip` |
            | Firefox | `datalyz-firefox-${{ steps.version.outputs.tag }}.zip` |

            ### ⚙️ Installation (unpacked)
            **Chrome:** `chrome://extensions` → Enable Developer Mode → Load unpacked
            **Firefox:** `about:debugging` → This Firefox → Load Temporary Add-on

            ---
            > ⚠️ This is an automated release generated by GitHub Actions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
